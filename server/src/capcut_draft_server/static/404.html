<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · capcut-draft</title>
<script>
(function(){
  var t=localStorage.getItem('capcut_theme');
  if(!t)t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
<style>
  :root {
    --bg: #06080d;
    --fg: #e8eaf0; --fg-dim: #6c7385; --fg-muted: #3a3f4f;
    --accent: #00d4ff; --accent2: #7c3aed;
    --grid-line: rgba(255,255,255,.018);
    --orb-opacity: .3;
    --link-sec-bg: rgba(255,255,255,.05); --link-sec-border: rgba(255,255,255,.08);
    --link-sec-hover-border: rgba(255,255,255,.15);
    --toggle-bg: rgba(255,255,255,.08);
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", monospace;
    --sans: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
  }
  [data-theme="light"] {
    --bg: #f0f2f5;
    --fg: #1a1d26; --fg-dim: #6b7280; --fg-muted: #9ca3af;
    --accent: #0891b2; --accent2: #7c3aed;
    --grid-line: rgba(0,0,0,.04);
    --orb-opacity: .15;
    --link-sec-bg: rgba(255,255,255,.7); --link-sec-border: rgba(0,0,0,.1);
    --link-sec-hover-border: rgba(0,0,0,.2);
    --toggle-bg: rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--fg); font-family: var(--sans);
    display: flex; align-items: center; justify-content: center;
  }

  .bg-canvas { position: fixed; inset: 0; z-index: 0; }
  .bg-orb {
    position: absolute; border-radius: 50%; filter: blur(120px); opacity: var(--orb-opacity);
    animation: drift 22s ease-in-out infinite alternate;
  }
  .bg-orb.a { width: 600px; height: 600px; background: radial-gradient(circle, #00d4ff, transparent 70%); top: -20%; left: 10%; animation-delay: 0s; }
  .bg-orb.b { width: 450px; height: 450px; background: radial-gradient(circle, #7c3aed, transparent 70%); bottom: -15%; right: 5%; animation-delay: -8s; }
  .bg-orb.c { width: 300px; height: 300px; background: radial-gradient(circle, #ff6a00, transparent 70%); top: 40%; right: 30%; animation-delay: -15s; opacity: .18; }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    33%  { transform: translate(50px, -40px) scale(1.1) rotate(3deg); }
    66%  { transform: translate(-30px, 30px) scale(.92) rotate(-2deg); }
    100% { transform: translate(15px, -15px) scale(1.05) rotate(1deg); }
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 1;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 60% 55% at 50% 50%, black, transparent);
  }

  .content {
    position: relative; z-index: 2; text-align: center; padding: 20px;
    animation: fade-up .7s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* giant 404 */
  .code {
    font-family: var(--mono); font-size: clamp(120px, 22vw, 200px);
    font-weight: 900; line-height: 1; letter-spacing: -4px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, #ff6a00 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
    animation: glow-text 4s ease-in-out infinite alternate;
  }
  @keyframes glow-text {
    0%   { filter: drop-shadow(0 0 20px rgba(0,212,255,.3)); }
    100% { filter: drop-shadow(0 0 40px rgba(124,58,237,.4)); }
  }

  .subtitle {
    font-size: 18px; font-weight: 500; color: var(--fg-dim);
    margin-top: 12px; letter-spacing: .5px;
  }

  .desc {
    font-size: 14px; color: var(--fg-muted); margin-top: 10px;
    font-family: var(--mono); letter-spacing: .5px;
  }

  /* glitch line */
  .glitch-bar {
    width: 60px; height: 3px; margin: 28px auto;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; position: relative;
    animation: bar-pulse 2s ease-in-out infinite;
  }
  .glitch-bar::before {
    content: ''; position: absolute; inset: 0;
    background: inherit; border-radius: inherit;
    animation: bar-glitch 3s steps(1) infinite;
  }
  @keyframes bar-pulse {
    0%, 100% { opacity: .7; transform: scaleX(1); }
    50%      { opacity: 1; transform: scaleX(1.5); }
  }
  @keyframes bar-glitch {
    0%, 90%, 100% { transform: translateX(0); opacity: 0; }
    92% { transform: translateX(-20px) scaleX(2); opacity: .6; }
    94% { transform: translateX(15px) scaleX(.5); opacity: .4; }
    96% { transform: translateX(-8px); opacity: 0; }
  }

  /* links */
  .links {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 8px;
  }
  .link {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 24px; border-radius: 10px;
    font-size: 13px; font-weight: 600; text-decoration: none;
    transition: all .2s;
  }
  .link.primary {
    background: linear-gradient(135deg, var(--accent), #4a8df8);
    color: #0a0b0e;
  }
  .link.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,212,255,.3);
  }
  .link.secondary {
    background: var(--link-sec-bg);
    border: 1px solid var(--link-sec-border);
    color: var(--fg-dim);
    backdrop-filter: blur(10px);
  }
  .link.secondary:hover {
    border-color: var(--link-sec-hover-border); color: var(--fg);
    transform: translateY(-2px);
  }

  /* floating particles */
  .particle {
    position: fixed; z-index: 1; border-radius: 50%;
    background: var(--accent); opacity: 0;
    animation: particle-float linear infinite;
  }
  @keyframes particle-float {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: .6; }
    90%  { opacity: .6; }
    100% { opacity: 0; transform: translateY(-20vh) scale(1); }
  }

  /* theme toggle */
  .theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 50;
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--toggle-bg); border: 1px solid var(--link-sec-border);
    backdrop-filter: blur(20px); cursor: pointer;
    display: grid; place-items: center; font-size: 18px;
    transition: all .2s; color: var(--fg-dim);
  }
  .theme-toggle:hover { color: var(--fg); transform: scale(1.05); }
  [data-theme="light"] .icon-moon { display: inline; }
  [data-theme="light"] .icon-sun { display: none; }
  [data-theme="dark"] .icon-moon { display: none; }
  [data-theme="dark"] .icon-sun { display: inline; }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" title="切换主题">
  <span class="icon-sun">☀️</span><span class="icon-moon">🌙</span>
</button>

<div class="bg-canvas">
  <div class="bg-orb a"></div>
  <div class="bg-orb b"></div>
  <div class="bg-orb c"></div>
</div>
<div class="bg-grid"></div>

<!-- particles -->
<div class="particle" style="width:3px;height:3px;left:15%;animation-duration:12s;animation-delay:0s;"></div>
<div class="particle" style="width:2px;height:2px;left:35%;animation-duration:16s;animation-delay:3s;background:#7c3aed;"></div>
<div class="particle" style="width:4px;height:4px;left:55%;animation-duration:10s;animation-delay:6s;"></div>
<div class="particle" style="width:2px;height:2px;left:75%;animation-duration:14s;animation-delay:2s;background:#ff6a00;"></div>
<div class="particle" style="width:3px;height:3px;left:90%;animation-duration:18s;animation-delay:8s;background:#7c3aed;"></div>
<div class="particle" style="width:2px;height:2px;left:8%;animation-duration:11s;animation-delay:5s;"></div>
<div class="particle" style="width:3px;height:3px;left:65%;animation-duration:13s;animation-delay:10s;background:#ff6a00;"></div>

<div class="content">
  <div class="code">404</div>
  <div class="subtitle">页面走丢了</div>
  <div class="desc">你访问的路径不存在或已被移除</div>
  <div class="glitch-bar"></div>
  <div class="links">
    <a href="/app/" class="link primary">← 回到工作台</a>
    <a href="/admin/" class="link secondary">管理后台</a>
    <a href="/docs" class="link secondary" target="_blank">API 文档</a>
  </div>
</div>

<script>
document.getElementById('theme-btn').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('capcut_theme', next);
});
</script>

</body>
</html>
