# ===================================================================
#   capcut-draft 客户端配置示例
#
#   复制本文件为 client.yaml，再修改 server.url 和 client_token。
#   client_token 在服务端登录后，点"客户端"页 → "注册"按钮拿到。
#
#   ⚠️ 本文件含敏感 token，请勿提交到 git。
# ===================================================================

# -------- 服务端 --------
server:
  url: "http://127.0.0.1:8000"   # 服务端公网 API（http://你的服务器:8000）

# -------- 客户端鉴权 --------
# 注册时服务端返回的明文 token（cap_xxx 开头）— 只能填一次，丢了就重新注册
client_token: "cap_请把这里换成服务端返回的token"

# -------- 客户端标识 --------
client:
  id: null           # 服务端注册的 ID（首次心跳后会自动写入，可留空）
  name: "小马的剪辑机"  # 显示在服务端 dashboard 上的名字
  hostname: ""        # 留空自动取本机名
  version: "0.1.0"

# -------- 本地 UI（只绑 127.0.0.1，绝不暴露公网） --------
ui:
  host: "127.0.0.1"
  port: 8001

# -------- 本地素材库扫描 --------
# 客户端会定时扫这些目录，把视频文件元数据（path/size/mtime）上报到服务端
# **文件本身永远不传云端**
assets:
  dirs:
    - "D:/videos/数字人"     # 数字人/口播主视频
    - "D:/videos/穿插素材"   # B-roll 素材
  # 文件名包含 → kind 映射（"main" = 主视频，"broll" = 素材）
  kinds:
    "数字人": "main"
    "口播": "main"
    "_main": "main"
    "素材": "broll"
    "_broll": "broll"
  rescan_interval_sec: 60     # 多久扫一次（秒）

# -------- 后台 worker --------
worker:
  poll_interval_sec: 3.0      # 多久轮询一次"我能领的任务"
  heartbeat_interval_sec: 20  # 多久发一次心跳
  output_dir: "./outputs"     # 草稿生成到哪里（**本地路径，不上传**）
  one_at_a_time: true         # 同时只跑 1 个任务（小机器友好）
